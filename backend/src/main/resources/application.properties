spring.application.name=cafeapp
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/cafeapp}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:cafeappuser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
jwt.secret=${CAFEAPP_JWT_SECRET:dev-only-change-me-dev-only-change-me-dev-only-change-me-dev-only-change-me}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${SPRING_JPA_FORMAT_SQL:false}
logging.level.org.hibernate.SQL=${LOGGING_LEVEL_SQL:INFO}
logging.level.org.hibernate.type.descriptor.sql=${LOGGING_LEVEL_SQL_BIND:INFO}
logging.level.org.hibernate.orm.jdbc.bind=${LOGGING_LEVEL_SQL_BIND:INFO}
logging.level.org.springframework.web.client.RestTemplate=${LOGGING_LEVEL_REST_TEMPLATE:INFO}
logging.level.com.fasterxml.jackson.databind=${LOGGING_LEVEL_JACKSON:INFO}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
cafeapp.jwtSecret=${CAFEAPP_JWT_SECRET:dev-only-change-me-dev-only-change-me-dev-only-change-me-dev-only-change-me}
cafeapp.jwtExpirationMs=${CAFEAPP_JWT_EXPIRATION_MS:86400000}
